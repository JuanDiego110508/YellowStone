<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellowstone information center</title>

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <header>
        <h1>Yellowstone information center</h1>
        <p>Explora informacion sobre la serie Yellowstone</p>
    </header>

    <main>
        <section id="menu-section">
            <h2>Consultas disponibles</h2>

            <div class="buttons-container">

                <button id="general-btn">
                    Informacion General
                </button>
                <button id="cast-btn">
                    Reparto
                </button>
                <button id="production-btn">
                    Produccion
                </button>
                <button id="ratings-btn">
                    Calificaciones
                </button>
                <button id="awards-btn">
                    Premios
                </button>
                <button id="plot-btn">
                    Sinopsis
                </button>
                <button id="clear-btn">
                    Limpiar
                </button>
            </div>
        </section>

        <section id="result-section">
            <h2>Resultado</h2>

            <div id="result-container">
                <p>Selecciona una opcion para ver la informacion</p>
            </div>
        </section>
    </main>

    <footer>
        <p>OMDb API Project - Yellowstone</p>
    </footer>

    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/main.js"></script>
    
</body>
</html>
